<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    lucide.createIcons();
    
    // ==========================================
    // 1. 全域變數與金鑰設定
    // ==========================================
    const MY_LIFF_ID = "2008934010-6z7iElYg";
    const API_BASE_URL = "https://deeplearning101-api-ciecietaipei.hf.space";

    // 請在這裡填寫您的 Supabase 專案網址與公開金鑰
    const SUPABASE_URL = "https://rqnjrunewfwkmluplkut.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxbmpydW5ld2Z3a21sdXBsa3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NTM0MTksImV4cCI6MjA4NDAyOTQxOX0.tpEA3PHIQyk843eO3kYrOfUCsA0lAuGRSWU9R5LyZhU";
    
    let supabaseClient = null;
    try {
        const testUrl = new URL(SUPABASE_URL); 
        if (testUrl.protocol === "http:" || testUrl.protocol === "https:") {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
    } catch (e) { console.warn("⚠️ Supabase 網址尚未設定"); }

    const BUSINESS_HOURS = { 'dine-in': { start: 18.5, end_weekday: 25.5, end_weekend: 26.5 }, 'takeout': { start: 12.0, end_weekday: 25.5, end_weekend: 26.5 } };
    let state = { view: 1, service: null, pax: 2, wantsPreorder: false, cart: {}, menuData: [], lineId: "" };
    
    const MOCK_MENU = [
        { id: 'steak', name: '炭烤肋眼牛排 12oz', price: 1500, desc: '附烤大蒜與特製紅酒醬', require_prepay: true, category: 'main', image_url: 'https://images.unsplash.com/photo-1546833999-b9f581a1996d?q=80&w=300&auto=format&fit=crop', allow_takeout: false, available_times: ["晚餐 (18:30-21:30)"] },
        { id: 'wine', name: '精選單杯紅酒', price: 250, desc: 'Cabernet Sauvignon', require_prepay: false, category: 'drink', image_url: null, allow_takeout: false, available_times: ["晚餐 (18:30-21:30)", "宵夜 (21:30後)"] },
        { id: 'fries', name: '松露脆薯', price: 280, desc: '現刨帕瑪森起司', require_prepay: false, category: 'snack', image_url: null, allow_takeout: true, available_times: ["白天 (11:00-18:30)", "晚餐 (18:30-21:30)", "宵夜 (21:30後)"] }
    ];

    // ==========================================
    // 2. 系統初始化啟動 (處理 URL Webhook 攔截)
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');

        if (action) {
            handleUrlWebhook(urlParams);
            return; 
        }

        initLiff(); initDateSelect(); fetchMenuData(); 
    });

    // 🌟 新增：處理 LINE Pay 付款回傳與信件回傳 🌟
    async function handleUrlWebhook(urlParams) {
        const action = urlParams.get('action');
        
        document.getElementById('view1').classList.add('hidden-view');
        document.getElementById('confirmationView').classList.remove('hidden-view');
        
        // 🌟 新增：處理補付款 (Repay) 的攔截器 🌟
        if (action === 'repay') {
            const orderId = urlParams.get('order_id');
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            
            document.getElementById('confirmTitle').innerText = '繼續完成付款';
            document.getElementById('confirmDesc').innerText = `您的訂單 (${orderId})\n尚未完成結帳。請點擊下方按鈕前往 LINE Pay 付款，以保留您的訂位。`;
            document.getElementById('confirmIcon').setAttribute('data-lucide', 'credit-card');
            
            const actionBtn = document.querySelector('#confirmSuccess button');
            actionBtn.innerText = "前往 LINE Pay 結帳";
            actionBtn.classList.replace('bg-dark-800', 'bg-gold-500');
            actionBtn.classList.replace('text-gold-500', 'text-black');
            
            actionBtn.onclick = async () => {
                const originalText = actionBtn.innerText;
                actionBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto text-black"></i>`;
                actionBtn.disabled = true;
                lucide.createIcons();
                
                try {
                    // 向 FastAPI 索取全新的 LINE Pay 網址
                    const res = await fetch(`${API_BASE_URL}/api/linepay/repay`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ order_id: orderId })
                    });
                    const result = await res.json();
                    
                    if (res.ok && result.payment_url) {
                        window.location.href = result.payment_url;
                    } else {
                        throw new Error(result.detail || "無法產生結帳連結");
                    }
                } catch(e) {
                    alert(`❌ 發生錯誤: ${e.message}`);
                    actionBtn.innerText = originalText;
                    actionBtn.disabled = false;
                }
            };
            lucide.createIcons();
            return;
        }

        // 處理 LINE Pay 結帳完成回傳
        if (action === 'payment_confirm') {
            const transactionId = urlParams.get('transactionId');
            const orderId = urlParams.get('orderId');
            const amount = urlParams.get('amount');

            try {
                const res = await fetch(`${API_BASE_URL}/api/linepay/confirm`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ transaction_id: transactionId, order_id: orderId, amount: parseInt(amount) })
                });
                const result = await res.json();
                
                if (res.ok) {
                    document.getElementById('confirmLoading').classList.add('hidden-view');
                    document.getElementById('confirmSuccess').classList.remove('hidden-view');
                    document.getElementById('confirmTitle').innerText = '結帳與訂位成功！';
                    document.getElementById('confirmDesc').innerText = '已收到您的款項，期待您的光臨。';
                } else { throw new Error(result.detail); }
            } catch(e) {
                document.getElementById('confirmLoading').classList.add('hidden-view');
                document.getElementById('confirmSuccess').classList.remove('hidden-view');
                document.getElementById('confirmTitle').innerText = '結帳確認失敗';
                document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
                document.getElementById('confirmDesc').innerText = '付款可能未完成或發生錯誤，請聯繫客服。';
                document.getElementById('confirmIcon').setAttribute('data-lucide', 'alert-circle');
                document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            }
            lucide.createIcons();
            return;
        }

        // 處理客人在 LINE Pay 放棄結帳 (取消)
        if (action === 'payment_cancel') {
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            document.getElementById('confirmTitle').innerText = '已取消結帳';
            document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
            document.getElementById('confirmDesc').innerText = '本次訂單並未成立。';
            document.getElementById('confirmIcon').setAttribute('data-lucide', 'x-circle');
            document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            lucide.createIcons();
            return;
        }

        // 處理信件點擊確認/取消 (原始邏輯)
        setTimeout(() => {
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            if (action === 'cancel') {
                document.getElementById('confirmTitle').innerText = '訂位已取消';
                document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
                document.getElementById('confirmDesc').innerText = '已為您取消本次預約，期待下次能為您服務。';
                document.getElementById('confirmIcon').setAttribute('data-lucide', 'x-circle');
                document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            }
            lucide.createIcons();
        }, 1500);
    }

    async function initLiff() {
        const statusDiv = document.getElementById('liffStatus');
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                state.lineId = profile.userId;
                statusDiv.innerText = `✅ LINE 綁定成功`; statusDiv.classList.add('text-green-500');
            } else { statusDiv.innerText = `ℹ️ 訪客模式 (未登入 LINE)`; }
        } catch (err) { statusDiv.innerText = `⚠️ 訪客模式`; }
    }

    async function fetchMenuData() { 
        try {
            if (!supabaseClient) throw new Error("無 Supabase 連線");
            const { data, error } = await supabaseClient.from('menu_items').select('*').eq('is_active', true); 
            if (error) throw error;
            if (data && data.length > 0) state.menuData = data; else state.menuData = MOCK_MENU;
        } catch (err) { state.menuData = MOCK_MENU; }
    }

    function initDateSelect() {
        const dateSelect = document.getElementById('dateSelect');
        const today = new Date();
        const weekdays = ["(日)", "(一)", "(二)", "(三)", "(四)", "(五)", "(六)"];
        let html = '';
        for(let i=0; i<30; i++) {
            let d = new Date(today); d.setDate(today.getDate() + i);
            let y = d.getFullYear(); let m = String(d.getMonth() + 1).padStart(2, '0'); let day = String(d.getDate()).padStart(2, '0');
            let dateStr = `${y}-${m}-${day}`;
            html += `<option value="${dateStr}">${dateStr} ${weekdays[d.getDay()]}</option>`;
        }
        dateSelect.innerHTML = html; updateTimeSlots(); 
    }

    function updateTimeSlots() {
        const dateSelect = document.getElementById('dateSelect'); const timeSelect = document.getElementById('timeSelect');
        if(!dateSelect.value) return;

        const config = BUSINESS_HOURS[state.service || 'dine-in'];
        const selectedDate = new Date(dateSelect.value); const now = new Date();
        const isToday = (dateSelect.value === `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`);
        const isWeekend = (selectedDate.getDay() === 5 || selectedDate.getDay() === 6);
        const endHour = isWeekend ? config.end_weekend : config.end_weekday;

        let slots = [];
        for(let v = config.start; v <= endHour; v += 0.5) {
            let displayStr = `${String(Math.floor(v) % 24).padStart(2, '0')}:${(v % 1 !== 0) ? '30' : '00'}`;
            slots.push({ display: displayStr, val: v });
        }

        let validSlots = slots;
        if (isToday) {
            const currentVal = now.getHours() + (now.getMinutes() / 60);
            if (now.getHours() >= 0 && now.getHours() < 5) validSlots = slots.filter(s => s.val >= config.start); 
            else validSlots = slots.filter(s => s.val > (currentVal + 0.5));
        }

        if (validSlots.length === 0) { timeSelect.innerHTML = `<option value="">-- 該日已無可選時段 --</option>`; timeSelect.disabled = true; } 
        else { timeSelect.innerHTML = validSlots.map(s => `<option value="${s.display}">${s.display}</option>`).join(''); timeSelect.disabled = false; }
    }

    function selectService(type) {
        state.service = type; state.cart = {}; state.view = 2; 
        document.querySelectorAll('.qty-display').forEach(el => el.innerText = '0');
        
        const paxSec = document.getElementById('paxSection'); const preSec = document.getElementById('preorderSection'); const timeLabel = document.getElementById('timeLabel');
        if (type === 'takeout') { 
            paxSec.classList.add('hidden-view'); preSec.classList.add('hidden-view');
            timeLabel.innerText = '🛍️ 取餐時間 Pickup Time';
            document.getElementById('menuNotice').innerText = "💡 外帶需全額線上結帳。 (已隱藏不開放外帶之品項)";
            state.wantsPreorder = true; 
        } else { 
            paxSec.classList.remove('hidden-view'); preSec.classList.remove('hidden-view');
            timeLabel.innerText = '⏰ 訂位時間 Time'; state.pax = 2; state.wantsPreorder = document.getElementById('preorderToggle').checked = false; 
            updatePaxDisplay(); 
        }
        updateTimeSlots(); updateView();
    }

    function togglePreorder() { state.wantsPreorder = document.getElementById('preorderToggle').checked; updateBottomBar(); }
    function goBack() { if (state.view === 2) { state.view = 1; state.service = null; } else if (state.view === 3) { state.view = 2; } updateView(); }
    function updateView() {
        document.getElementById('view1').classList.toggle('hidden-view', state.view !== 1);
        document.getElementById('view2').classList.toggle('hidden-view', state.view !== 2);
        document.getElementById('view3').classList.toggle('hidden-view', state.view !== 3);
        const navBar = document.getElementById('navBar');
        if (state.view === 1) navBar.classList.add('hidden-view');
        else { navBar.classList.remove('hidden-view'); document.getElementById('navTitle').innerText = state.service === 'dine-in' ? (state.view === 2 ? "填寫訂位資訊" : "預先點餐") : (state.view === 2 ? "填寫聯絡資料" : "外帶菜單"); }
        updateBottomBar(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function adjustPax(delta) { let newPax = state.pax + delta; if (newPax >= 1 && newPax <= 10) { state.pax = newPax; updatePaxDisplay(); updateBottomBar(); } }
    function updatePaxDisplay() { document.getElementById('paxDisplay').innerText = state.pax; document.getElementById('paxWarning').classList.toggle('hidden-view', state.pax < 5); }

    function getMealPeriod(timeStr) {
        if (!timeStr) return "晚餐 (18:30-21:30)"; 
        let [h, m] = timeStr.split(':'); let hourVal = parseInt(h) + (parseInt(m) / 60);
        if (hourVal >= 0 && hourVal <= 5) hourVal += 24; 
        if (hourVal >= 11 && hourVal < 18.5) return "白天 (11:00-18:30)";
        if (hourVal >= 18.5 && hourVal < 21.5) return "晚餐 (18:30-21:30)";
        return "宵夜 (21:30後)";
    }

    function renderMenu() {
        const container = document.getElementById('menuContainer');
        const currentPeriod = getMealPeriod(document.getElementById('timeSelect') ? document.getElementById('timeSelect').value : '');
        let html = ''; let renderCount = 0;

        state.menuData.forEach(item => {
            const allowTakeout = item.hasOwnProperty('allow_takeout') ? item.allow_takeout : true;
            const availableTimes = item.available_times || ["白天 (11:00-18:30)", "晚餐 (18:30-21:30)", "宵夜 (21:30後)"];
            if (state.service === 'takeout' && !allowTakeout) return;
            if (!availableTimes.includes(currentPeriod)) return;
            renderCount++;

            const imgHtml = item.image_url ? `<img src="${item.image_url}" class="w-full h-40 object-cover rounded-lg mb-3 border border-dark-700 shadow-md">` : '';
            const tagClass = item.require_prepay ? 'border-rose-900 text-rose-400' : 'border-dark-600 text-gray-500';
            const tagText = item.require_prepay ? '需全額預付' : '訂金 30%';

            html += `
            <div class="bg-dark-800 border border-dark-700 rounded-xl p-4 flex flex-col">
                ${imgHtml}
                <div class="flex justify-between items-start mb-3">
                    <div><h3 class="text-white font-bold text-lg">${item.name}</h3><p class="text-gray-400 text-xs mt-1 leading-relaxed">${item.description || item.desc || ''}</p></div>
                    <span class="text-gold-500 font-bold">$${item.price}</span>
                </div>
                <div class="flex justify-between items-center mt-2 border-t border-dark-700 pt-3">
                    <span class="text-[10px] px-2 py-1 rounded bg-dark-900 border ${tagClass}">${tagText}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateCart('${item.id}', -1)" class="w-8 h-8 rounded-full bg-dark-700 text-white flex justify-center items-center active:scale-90"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <span id="qty-${item.id}" class="qty-display font-bold w-4 text-center">${state.cart[item.id] || 0}</span>
                        <button onclick="updateCart('${item.id}', 1)" class="w-8 h-8 rounded-full bg-gold-500 text-black flex justify-center items-center active:scale-90"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>`;
        });

        if (renderCount === 0) html = `<div class="text-center p-10 border border-dashed border-dark-700 rounded-xl text-gray-500"><i data-lucide="utensils-crossed" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>您選擇的時段 (${currentPeriod})<br>目前無供應餐點，或未開放外帶。</div>`;
        container.innerHTML = html; lucide.createIcons();
    }

    function updateCart(itemId, delta) {
        if (!state.cart[itemId]) state.cart[itemId] = 0;
        let newQty = state.cart[itemId] + delta;
        if (newQty >= 0) { state.cart[itemId] = newQty; document.getElementById(`qty-${itemId}`).innerText = newQty; updateBottomBar(); }
    }

    function updateBottomBar() {
        const bar = document.getElementById('bottomBar'); const btn = document.getElementById('mainActionBtn');
        const summaryTotal = document.getElementById('summaryTotal'); const summaryDeposit = document.getElementById('summaryDeposit'); const desc = document.getElementById('depositRuleDesc');

        if (state.view === 1) { bar.classList.add('hidden-view'); return; }
        bar.classList.remove('hidden-view');

        let totalFoodAmount = 0; let foodDeposit = 0; let cartItemCount = 0;
        state.menuData.forEach(item => {
            let qty = state.cart[item.id] || 0;
            if (qty > 0) {
                cartItemCount += qty; let cost = qty * item.price; totalFoodAmount += cost;
                if (state.service === 'takeout') foodDeposit += cost; else foodDeposit += item.require_prepay ? cost : cost * 0.3;
            }
        });

        let finalDeposit = 0; let ruleTexts = [];
        
        if (state.view === 2) {
            summaryTotal.classList.add('hidden-view');
            if (state.service === 'takeout') {
                desc.innerText = "請先填寫聯絡資料"; btn.innerText = "下一步 (挑選外帶餐點)"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
            } else if (state.service === 'dine-in') {
                let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0; finalDeposit = paxDeposit;
                if (paxDeposit > 0) ruleTexts.push(`${state.pax}人訂位金$${paxDeposit}`);
                if (state.wantsPreorder) {
                    desc.innerText = ruleTexts.length > 0 ? ruleTexts.join(" + ") : "請先填寫資料再挑選餐點"; btn.innerText = "下一步 (挑選預點餐點)"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
                } else {
                    desc.innerText = paxDeposit > 0 ? ruleTexts.join(" + ") : "人數 4 人內免收訂金 (系統將查核 No-Show)"; btn.innerText = finalDeposit > 0 ? "確認並前往付款" : "確認訂位 (送出資料)"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
                }
            }
        } else if (state.view === 3) {
            summaryTotal.innerText = `餐點總計: $${totalFoodAmount}`; summaryTotal.classList.remove('hidden-view');
            if (state.service === 'takeout') {
                finalDeposit = totalFoodAmount; desc.innerText = "外帶需全額線上結帳";
                if (cartItemCount === 0) { btn.innerText = "請選擇餐點"; btn.className = "w-full bg-dark-700 text-gray-500 font-bold text-lg rounded-xl py-3.5"; } 
                else { btn.innerText = "確認並前往付款"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5 shadow-lg active:scale-[0.98]"; }
            } else if (state.service === 'dine-in') {
                let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0; finalDeposit = paxDeposit + foodDeposit;
                if (foodDeposit > 0) ruleTexts.push(`餐點預付$${Math.round(foodDeposit)}`);
                desc.innerText = ruleTexts.length > 0 ? ruleTexts.join(" + ") : "免收訂金 (系統將查核 No-Show)"; btn.innerText = finalDeposit > 0 ? "確認並前往付款" : "送出訂位與點餐"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
            }
        }
        summaryDeposit.innerText = `$${Math.round(finalDeposit).toLocaleString()}`;
    }

    function validateForm() {
        const name = document.getElementById('custName').value.trim(); const tel = document.getElementById('custTel').value.trim(); const time = document.getElementById('timeSelect') ? document.getElementById('timeSelect').value : '';
        if(!name || !tel || !time) { alert("⚠️ 請完整填寫姓名與電話，並確保已選擇時段。"); return false; }
        if((tel.match(/\d/g) || []).length < 6) { alert("⚠️ 電話號碼格式錯誤。"); return false; }
        return true;
    }

    async function handleMainAction() {
        const btn = document.getElementById('mainActionBtn');
        if (btn.innerText === "請選擇餐點") return;

        if (state.view === 2) {
            if (!validateForm()) return; 
            if (state.service === 'takeout' || (state.service === 'dine-in' && state.wantsPreorder)) {
                renderMenu(); state.view = 3; 
                document.getElementById('menuNotice').innerText = state.service === 'takeout' ? "💡 外帶需全額線上結帳。 (已隱藏不開放外帶之品項)" : "💡 高價食材需全額預付，一般餐點收 30% 訂金。 (已根據時段自動過濾)"; 
                updateView(); return;
            }
        }

        const originalText = btn.innerText;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-black"></i>`;
        lucide.createIcons(); btn.disabled = true;

        let totalFoodAmount = 0; let foodDeposit = 0;
        state.menuData.forEach(item => {
            let qty = state.cart[item.id] || 0;
            if (qty > 0) {
                totalFoodAmount += qty * item.price;
                foodDeposit += state.service === 'takeout' ? (qty * item.price) : (item.require_prepay ? (qty * item.price) : (qty * item.price) * 0.3);
            }
        });
        let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0;
        let finalDeposit = state.service === 'takeout' ? totalFoodAmount : (paxDeposit + foodDeposit);

        const payload = {
            service_type: state.service, name: document.getElementById('custName').value, tel: document.getElementById('custTel').value,
            date: document.getElementById('dateSelect').value, time: document.getElementById('timeSelect').value,
            line_id: state.lineId, pax: state.pax, cart: state.cart, total_amount: totalFoodAmount, deposit_required: Math.round(finalDeposit)
        };

        try {
            const response = await fetch(`${API_BASE_URL}/api/submit_booking`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.status === "require_payment") {
                let msg = `💳 系統提示\n`;
                if (result.is_noshow_penalty) msg += `⚠️ 由於您過去有未出席(No-Show)紀錄，本次訂單需收取訂金 $${result.deposit_amount}。\n\n`;
                else if (result.deposit_amount > 0) msg += `本次訂單需線上支付 $${result.deposit_amount}。\n\n`;
                msg += `點擊確定後，將導向 LINE Pay 進行結帳。`;
                alert(msg);
                window.location.href = result.payment_url;
            } else if (result.status === "success") {
                alert(`✅ 訂位成功！\n期待您的光臨。`);
                window.location.href = "./index.html"; 
            } else { throw new Error(result.detail || "發生未知錯誤"); }
        } catch (error) {
            alert(`❌ 送出失敗: ${error.message}\n請確認 FastAPI 伺服器是否正常運作，且 API_BASE_URL 網址正確。`);
            btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
        }
    }
</script>
</body>
</html>
