<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    lucide.createIcons();
    
    // ==========================================
    // 1. 全域變數與金鑰設定
    // ==========================================
    const MY_LIFF_ID = "2008934010-6z7iElYg";
    const API_BASE_URL = "https://deeplearning101-api-ciecietaipei.hf.space";

    const SUPABASE_URL = "https://rqnjrunewfwkmluplkut.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxbmpydW5ld2Z3a21sdXBsa3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NTM0MTksImV4cCI6MjA4NDAyOTQxOX0.tpEA3PHIQyk843eO3kYrOfUCsA0lAuGRSWU9R5LyZhU";
    
    let supabaseClient = null;
    try {
        const testUrl = new URL(SUPABASE_URL); 
        if (testUrl.protocol === "http:" || testUrl.protocol === "https:") {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
    } catch (e) { console.warn("⚠️ Supabase 網址尚未設定"); }

    const BUSINESS_HOURS = {
        'dine-in': { start: 18.5, end_weekday: 25.5, end_weekend: 26.5 }, 
        'takeout': { start: 11.5, end_weekday: 14.0, end_weekend: 14.0 }
    };
    
    // 🌟 核心升級：cart 變成陣列，用來儲存精準的組合包紀錄
    let state = { view: 1, service: null, pax: 2, wantsPreorder: false, cart: [], menuData: [], lineId: "", soldToday: {} };
    
    // ==========================================
    // 2. 系統初始化與 Webhook 攔截
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        if (action) { handleUrlWebhook(urlParams); return; }
        initLiff(); initDateSelect(); fetchMenuData(); 
    });

    async function handleUrlWebhook(urlParams) {
        const action = urlParams.get('action');
        document.getElementById('view1').classList.add('hidden-view');
        document.getElementById('confirmationView').classList.remove('hidden-view');
        
        if (action === 'repay') {
            const orderId = urlParams.get('order_id');
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            document.getElementById('confirmTitle').innerText = '繼續完成付款';
            document.getElementById('confirmDesc').innerText = `您的訂單 (${orderId})\n尚未完成結帳。請點擊下方按鈕前往 LINE Pay 付款，以保留您的訂位。`;
            document.getElementById('confirmIcon').setAttribute('data-lucide', 'credit-card');
            
            const actionBtn = document.querySelector('#confirmSuccess button');
            actionBtn.innerText = "前往 LINE Pay 結帳";
            actionBtn.classList.replace('bg-dark-800', 'bg-gold-500');
            actionBtn.classList.replace('text-gold-500', 'text-black');
            
            actionBtn.onclick = async () => {
                const originalText = actionBtn.innerText;
                actionBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto text-black"></i>`;
                actionBtn.disabled = true; lucide.createIcons();
                try {
                    const res = await fetch(`${API_BASE_URL}/api/linepay/repay`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ order_id: orderId })
                    });
                    const result = await res.json();
                    if (res.ok && result.payment_url) { window.location.href = result.payment_url; } 
                    else { throw new Error(result.detail || "無法產生結帳連結"); }
                } catch(e) { alert(`❌ 發生錯誤: ${e.message}`); actionBtn.innerText = originalText; actionBtn.disabled = false; }
            };
            lucide.createIcons(); return;
        }

        if (action === 'payment_confirm') {
            const transactionId = urlParams.get('transactionId'); const orderId = urlParams.get('orderId'); const amount = urlParams.get('amount');
            try {
                const res = await fetch(`${API_BASE_URL}/api/linepay/confirm`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ transaction_id: transactionId, order_id: orderId, amount: parseInt(amount) })
                });
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('confirmLoading').classList.add('hidden-view');
                    document.getElementById('confirmSuccess').classList.remove('hidden-view');
                    document.getElementById('confirmTitle').innerText = '結帳與訂位成功！';
                    document.getElementById('confirmDesc').innerText = '已收到您的款項，期待您的光臨。';
                } else { throw new Error(result.detail); }
            } catch(e) {
                document.getElementById('confirmLoading').classList.add('hidden-view');
                document.getElementById('confirmSuccess').classList.remove('hidden-view');
                document.getElementById('confirmTitle').innerText = '結帳確認失敗';
                document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
                document.getElementById('confirmDesc').innerText = '付款可能未完成或發生錯誤，請聯繫客服。';
                document.getElementById('confirmIcon').setAttribute('data-lucide', 'alert-circle');
                document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            }
            lucide.createIcons(); return;
        }

        if (action === 'payment_cancel') {
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            document.getElementById('confirmTitle').innerText = '已取消結帳';
            document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
            document.getElementById('confirmDesc').innerText = '本次訂單並未成立。';
            document.getElementById('confirmIcon').setAttribute('data-lucide', 'x-circle');
            document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            lucide.createIcons(); return;
        }

        setTimeout(() => {
            document.getElementById('confirmLoading').classList.add('hidden-view');
            document.getElementById('confirmSuccess').classList.remove('hidden-view');
            if (action === 'cancel') {
                document.getElementById('confirmTitle').innerText = '訂位已取消';
                document.getElementById('confirmTitle').classList.replace('text-gold-500', 'text-red-500');
                document.getElementById('confirmDesc').innerText = '已為您取消本次預約，期待下次能為您服務。';
                document.getElementById('confirmIcon').setAttribute('data-lucide', 'x-circle');
                document.getElementById('confirmIcon').classList.replace('text-green-500', 'text-red-500');
            }
            lucide.createIcons();
        }, 1500);
    }

    async function initLiff() {
        const statusDiv = document.getElementById('liffStatus');
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                state.lineId = profile.userId;
                statusDiv.innerText = `✅ LINE 綁定成功`; statusDiv.classList.add('text-green-500');
            } else { statusDiv.innerText = `ℹ️ 訪客模式 (未登入 LINE)`; }
        } catch (err) { statusDiv.innerText = `⚠️ 訪客模式`; }
    }

    async function fetchMenuData() { 
        try {
            if (!supabaseClient) throw new Error("無 Supabase 連線");
            const { data, error } = await supabaseClient.from('menu_items').select('*').eq('is_active', true); 
            if (error) throw error;
            if (data && data.length > 0) state.menuData = data;
        } catch (err) { console.warn(err); }
    }

    async function updateInventory() {
        const dateSelect = document.getElementById('dateSelect');
        if (!dateSelect || !dateSelect.value) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/inventory/${dateSelect.value}`);
            if (res.ok) { state.soldToday = await res.json(); } else { state.soldToday = {}; }
            if (state.view === 3) renderMenu();
        } catch(e) { state.soldToday = {}; }
    }

    function initDateSelect() {
        const dateSelect = document.getElementById('dateSelect');
        const today = new Date(); const weekdays = ["(日)", "(一)", "(二)", "(三)", "(四)", "(五)", "(六)"];
        let html = '';
        for(let i=0; i<30; i++) {
            let d = new Date(today); d.setDate(today.getDate() + i);
            let y = d.getFullYear(); let m = String(d.getMonth() + 1).padStart(2, '0'); let day = String(d.getDate()).padStart(2, '0');
            html += `<option value="${y}-${m}-${day}">${y}-${m}-${day} ${weekdays[d.getDay()]}</option>`;
        }
        dateSelect.innerHTML = html; updateTimeSlots(); updateInventory();
    }

    function updateTimeSlots() {
        const dateSelect = document.getElementById('dateSelect'); const timeSelect = document.getElementById('timeSelect');
        if(!dateSelect.value) return;
        const selectedDate = new Date(dateSelect.value); const now = new Date();
        const isToday = (dateSelect.value === `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`);
        const isWeekend = (selectedDate.getDay() === 0 || selectedDate.getDay() === 6); 

        let config; let isAvailable = true;
        if (state.service === 'takeout') {
            if (isWeekend) { isAvailable = false; } else { config = { start: 11.5, end: 14.0 }; }
        } else {
            const baseConfig = BUSINESS_HOURS['dine-in'];
            config = { start: baseConfig.start, end: isWeekend ? baseConfig.end_weekend : baseConfig.end_weekday };
        }

        let validSlots = [];
        if (isAvailable) {
            let slots = [];
            for(let v = config.start; v <= config.end; v += 0.5) {
                slots.push({ display: `${String(Math.floor(v) % 24).padStart(2, '0')}:${(v % 1 !== 0) ? '30' : '00'}`, val: v });
            }
            validSlots = slots;
            if (isToday) {
                const currentVal = now.getHours() + (now.getMinutes() / 60);
                if (now.getHours() >= 0 && now.getHours() < 5) validSlots = slots.filter(s => s.val >= config.start);
                else validSlots = slots.filter(s => s.val > (currentVal + 0.5));
            }
        }

        if (validSlots.length === 0) { 
            timeSelect.innerHTML = `<option value="">${state.service === 'takeout' && isWeekend ? "-- 假日未開放外帶 --" : "-- 該日已無可選時段 --"}</option>`; 
            timeSelect.disabled = true; 
        } else { 
            timeSelect.innerHTML = validSlots.map(s => `<option value="${s.display}">${s.display}</option>`).join(''); 
            timeSelect.disabled = false; 
        }
    }

    function selectService(type) {
        state.service = type; state.cart = []; state.view = 2; // 重置購物車陣列
        
        const paxSec = document.getElementById('paxSection'); const preSec = document.getElementById('preorderSection'); const timeLabel = document.getElementById('timeLabel');
        if (type === 'takeout') { 
            paxSec.classList.add('hidden-view'); preSec.classList.add('hidden-view');
            timeLabel.innerText = '🛍️ 取餐時間 Pickup Time';
            document.getElementById('menuNotice').innerText = "💡 外帶需全額線上結帳。 (已隱藏不開放外帶之品項)";
            state.wantsPreorder = true; 
        } else { 
            paxSec.classList.remove('hidden-view'); preSec.classList.remove('hidden-view');
            timeLabel.innerText = '⏰ 訂位時間 Time'; state.pax = 2; state.wantsPreorder = document.getElementById('preorderToggle').checked = false; 
            updatePaxDisplay(); 
        }
        updateTimeSlots(); updateView();
    }

    function togglePreorder() { state.wantsPreorder = document.getElementById('preorderToggle').checked; updateBottomBar(); }
    function goBack() { if (state.view === 2) { state.view = 1; state.service = null; } else if (state.view === 3) { state.view = 2; } updateView(); }
    function updateView() {
        document.getElementById('view1').classList.toggle('hidden-view', state.view !== 1);
        document.getElementById('view2').classList.toggle('hidden-view', state.view !== 2);
        document.getElementById('view3').classList.toggle('hidden-view', state.view !== 3);
        const navBar = document.getElementById('navBar');
        if (state.view === 1) navBar.classList.add('hidden-view');
        else { navBar.classList.remove('hidden-view'); document.getElementById('navTitle').innerText = state.service === 'dine-in' ? (state.view === 2 ? "填寫訂位資訊" : "預先點餐") : (state.view === 2 ? "填寫聯絡資料" : "外帶菜單"); }
        updateBottomBar(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function adjustPax(delta) { let newPax = state.pax + delta; if (newPax >= 1 && newPax <= 10) { state.pax = newPax; updatePaxDisplay(); updateBottomBar(); } }
    function updatePaxDisplay() { document.getElementById('paxDisplay').innerText = state.pax; document.getElementById('paxWarning').classList.toggle('hidden-view', state.pax < 5); }

    function getMealPeriod(timeStr) {
        if (!timeStr) return "晚餐 (18:30-21:30)"; 
        let [h, m] = timeStr.split(':'); let hourVal = parseInt(h) + (parseInt(m) / 60);
        if (hourVal >= 0 && hourVal <= 5) hourVal += 24; 
        if (hourVal >= 11 && hourVal < 18.5) return "白天 (11:00-18:30)";
        if (hourVal >= 18.5 && hourVal < 21.5) return "晚餐 (18:30-21:30)";
        return "宵夜 (21:30後)";
    }

    // 🌟 核心升級：動態選單渲染與互斥下拉選單 🌟
    function renderMenu() {
        const container = document.getElementById('menuContainer');
        const currentPeriod = getMealPeriod(document.getElementById('timeSelect') ? document.getElementById('timeSelect').value : '');
        
        // 將菜單資料進行分類
        const freeSauces = state.menuData.filter(i => i.price === 0);
        const paidSauces = state.menuData.filter(i => i.category === 'other' && i.price > 0);
        
        // 過濾要顯示在畫面上當作「主卡片」的商品（隱藏醬料）
        const displayItems = state.menuData.filter(i => {
            if (i.price === 0 || (i.category === 'other' && i.price > 0)) return false; 
            if (state.service === 'takeout' && !i.allow_takeout) return false;
            if (!(i.available_times || ["白天 (11:00-18:30)", "晚餐 (18:30-21:30)", "宵夜 (21:30後)"]).includes(currentPeriod)) return false;
            return true;
        });

        let html = '';
        if (displayItems.length === 0) {
            html = `<div class="text-center p-10 border border-dashed border-dark-700 rounded-xl text-gray-500"><i data-lucide="utensils-crossed" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>您選擇的時段 (${currentPeriod})<br>目前無供應餐點，或未開放外帶。</div>`;
        } else {
            displayItems.forEach(item => {
                // 庫存計算
                const dailyLimit = (item.daily_limit !== undefined && item.daily_limit !== null) ? item.daily_limit : 999;
                const sold = state.soldToday[item.id] || 0;
                // 注意：扣掉目前購物車陣列已經點的數量
                const inCart = state.cart.filter(c => c.mainId === item.id).length;
                const remaining = dailyLimit - sold - inCart;
                const isSoldOut = remaining <= 0;

                let limitBadge = '';
                let opacityClass = '';
                let btnClass = isSoldOut ? 'bg-dark-600 text-gray-500 cursor-not-allowed' : 'bg-gold-500 text-black hover:bg-gold-400 active:scale-95';
                
                if (dailyLimit < 999) {
                    if (isSoldOut) {
                        limitBadge = `<span class="bg-rose-900 text-rose-300 text-[10px] px-2 py-1 rounded ml-2 font-bold whitespace-nowrap">❌ 今日售完</span>`;
                        opacityClass = `opacity-50 grayscale`;
                    } else {
                        limitBadge = `<span class="bg-gold-600 text-black text-[10px] px-2 py-1 rounded ml-2 font-bold whitespace-nowrap">限量剩 ${remaining} 份</span>`;
                    }
                }

                const imgHtml = item.image_url ? `<img src="${item.image_url}" class="w-full h-40 object-cover rounded-lg mb-3 border border-dark-700 shadow-md">` : '';
                const tagClass = item.require_prepay ? 'border-rose-900 text-rose-400' : 'border-dark-600 text-gray-500';
                const tagText = item.require_prepay ? '需全額預付' : '訂金 30%';

                // 🌟 動態注入下拉選單：合併為一個「必選調味」選單 🌟
                let modifiersHtml = '';
                if (item.category === 'main') {
                    let optionsHtml = '<option value="">-- 必選調味 (免費或升級擇一) --</option>';
                    
                    if (freeSauces.length > 0) {
                        optionsHtml += `<optgroup label="✨ 免費調味">`;
                        freeSauces.forEach(s => optionsHtml += `<option value="${s.id}">${s.name}</option>`);
                        optionsHtml += `</optgroup>`;
                    }
                    if (paidSauces.length > 0) {
                        optionsHtml += `<optgroup label="💎 升級加購醬料">`;
                        paidSauces.forEach(s => optionsHtml += `<option value="${s.id}">${s.name} (+$${s.price})</option>`);
                        optionsHtml += `</optgroup>`;
                    }
                        
                    modifiersHtml = `<div class="mt-3 p-3 bg-dark-900/50 rounded-lg border border-dark-700">
                                        <select id="modifier_${item.id}" class="w-full bg-dark-900 border border-dark-700 text-white text-sm p-2.5 rounded-lg focus:border-gold-500">
                                            ${optionsHtml}
                                        </select>
                                     </div>`;
                }

                html += `
                <div class="bg-dark-800 border border-dark-700 rounded-xl p-4 flex flex-col ${opacityClass}">
                    ${imgHtml}
                    <div class="flex justify-between items-start mb-1 gap-2">
                        <div class="flex-1">
                            <h3 class="text-white font-bold text-lg inline-block">${item.name}</h3>${limitBadge}
                            <p class="text-gray-400 text-xs mt-1 leading-relaxed">${item.description || item.desc || ''}</p>
                        </div>
                        <span class="text-gold-500 font-bold text-lg">$${item.price}</span>
                    </div>
                    ${modifiersHtml}
                    <div class="flex justify-between items-center mt-3 border-t border-dark-700 pt-3">
                        <span class="text-[10px] px-2 py-1 rounded bg-dark-900 border ${tagClass}">${tagText}</span>
                        <button onclick="addToCart('${item.id}')" class="px-5 py-2 rounded-full font-bold transition-transform text-sm ${btnClass}" ${isSoldOut ? 'disabled' : ''}>
                            <i data-lucide="plus" class="w-4 h-4 inline-block mr-1"></i> 加入
                        </button>
                    </div>
                </div>`;
            });
        }
        
        // 🌟 底部明細清單區塊 🌟
        html += `<div id="cartSummaryBlock" class="mt-6 mb-4 bg-dark-900 border border-gold-500/30 rounded-xl p-4 shadow-lg">
                    <h3 class="text-gold-500 font-bold mb-3 flex items-center gap-2"><i data-lucide="shopping-cart" class="w-5 h-5"></i> 購物車明細</h3>
                    <div id="cartList" class="space-y-3 text-sm"></div>
                 </div>`;

        container.innerHTML = html; 
        lucide.createIcons();
        renderCartList(); // 呼叫渲染明細函式
    }

    // 🌟 新的組合加車邏輯：判斷客人選的是免費還是付費 🌟
    function addToCart(itemId) {
        const item = state.menuData.find(i => i.id === itemId);
        if (!item) return;

        let cartItem = { 
            uid: Date.now().toString(), 
            mainId: item.id, 
            mainName: item.name, 
            price: item.price,
            freeId: null, freeName: '',
            paidId: null, paidName: '', paidPrice: 0
        };

        if (item.category === 'main') {
            const modSelect = document.getElementById(`modifier_${item.id}`);
            
            if (modSelect && !modSelect.value) { 
                alert("⚠️ 請為您的主餐選擇一種調味！"); 
                return; 
            }
            if (modSelect && modSelect.value) {
                const modItem = state.menuData.find(i => i.id === modSelect.value);
                if (modItem.price === 0) {
                    cartItem.freeId = modItem.id;
                    cartItem.freeName = modItem.name;
                } else {
                    cartItem.paidId = modItem.id;
                    cartItem.paidName = modItem.name;
                    cartItem.paidPrice = modItem.price;
                }
            }
        }

        // 二次檢查庫存
        const dailyLimit = (item.daily_limit !== undefined && item.daily_limit !== null) ? item.daily_limit : 999;
        const sold = state.soldToday[item.id] || 0;
        const inCart = state.cart.filter(c => c.mainId === item.id).length;
        if (sold + inCart >= dailyLimit) {
            alert(`不好意思！這道餐點今天已經售完囉！`); 
            return;
        }

        // 加到陣列中
        state.cart.push(cartItem);
        
        // 🌟 加完後重置該主餐的下拉選單 🌟
        if (item.category === 'main') {
            if(document.getElementById(`modifier_${item.id}`)) {
                document.getElementById(`modifier_${item.id}`).value = "";
            }
        }

        renderMenu(); // 重新渲染以更新庫存鎖死狀態
        updateBottomBar();
    }

    // 🌟 渲染購物車明細清單 🌟
    function renderCartList() {
        const list = document.getElementById('cartList');
        if (!list) return;
        
        if (state.cart.length === 0) { 
            list.innerHTML = "<p class='text-gray-500 text-center py-4 border border-dashed border-dark-700 rounded-lg'>尚未選擇餐點</p>"; 
            return; 
        }
        
        let html = '';
        state.cart.forEach(c => {
            // 🌟 聰明的明細文字組合
            let descParts = [];
            if (c.freeId) descParts.push(`調味: ${c.freeName}`);
            if (c.paidId) descParts.push(`升級: ${c.paidName}`);
            let desc = descParts.length > 0 ? `(${descParts.join(', ')})` : '';
            
            let total = c.price + c.paidPrice;
            html += `
            <div class="flex justify-between items-start bg-dark-800 p-3 rounded-lg border border-dark-700">
                <div class="flex-1 pr-2">
                    <div class="text-white font-bold text-base">${c.mainName} <span class="text-gold-500 ml-2">$${total}</span></div>
                    <div class="text-xs text-gray-400 mt-1.5">${desc}</div>
                </div>
                <button onclick="removeFromCart('${c.uid}')" class="text-dark-600 bg-dark-900 p-2 rounded-md hover:text-rose-400 hover:bg-rose-900/30 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>`;
        });
        list.innerHTML = html;
        lucide.createIcons();
    }

    function removeFromCart(uid) {
        state.cart = state.cart.filter(c => c.uid !== uid);
        renderMenu(); // 更新庫存顯示
        updateBottomBar();
    }

    function updateBottomBar() {
        const bar = document.getElementById('bottomBar'); const btn = document.getElementById('mainActionBtn');
        const summaryTotal = document.getElementById('summaryTotal'); const summaryDeposit = document.getElementById('summaryDeposit'); const desc = document.getElementById('depositRuleDesc');

        if (state.view === 1) { bar.classList.add('hidden-view'); return; }
        bar.classList.remove('hidden-view');

        // 🌟 根據新陣列計算金額 🌟
        let totalFoodAmount = 0; let foodDeposit = 0; let cartItemCount = state.cart.length;
        state.cart.forEach(c => {
            let cost = c.price + c.paidPrice; 
            totalFoodAmount += cost;
            const item = state.menuData.find(i => i.id === c.mainId);
            if (state.service === 'takeout') {
                foodDeposit += cost; 
            } else { 
                foodDeposit += (item && item.require_prepay) ? cost : cost * 0.3;
            }
        });

        let finalDeposit = 0; let ruleTexts = [];
        
        if (state.view === 2) {
            summaryTotal.classList.add('hidden-view');
            if (state.service === 'takeout') {
                desc.innerText = "請務必先填寫聯絡資料"; btn.innerText = "下一步 (挑選外帶餐點)"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
            } else if (state.service === 'dine-in') {
                let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0; finalDeposit = paxDeposit;
                if (paxDeposit > 0) ruleTexts.push(`${state.pax}人訂位金$${paxDeposit}`);
                if (state.wantsPreorder) {
                    desc.innerText = ruleTexts.length > 0 ? ruleTexts.join(" + ") : "請先填寫資料再挑選餐點"; btn.innerText = "下一步 (挑選預點餐點)"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
                } else {
                    desc.innerText = paxDeposit > 0 ? ruleTexts.join(" + ") : "免收訂金 (系統將查核 No-Show)";
                    btn.innerText = finalDeposit > 0 ? "確認並前往付款" : "確認訂位 (送出資料)"; 
                    btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
                }
            }
        } else if (state.view === 3) {
            summaryTotal.innerText = `餐點總計: $${totalFoodAmount}`; summaryTotal.classList.remove('hidden-view');
            if (state.service === 'takeout') {
                finalDeposit = totalFoodAmount; desc.innerText = "外帶需全額線上結帳";
                if (cartItemCount === 0) { btn.innerText = "請選擇餐點"; btn.className = "w-full bg-dark-700 text-gray-500 font-bold text-lg rounded-xl py-3.5 cursor-not-allowed"; }
                else { btn.innerText = "確認並前往付款"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5 shadow-lg active:scale-[0.98]"; }
            } else if (state.service === 'dine-in') {
                let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0; finalDeposit = paxDeposit + foodDeposit;
                if (foodDeposit > 0) ruleTexts.push(`餐點預付$${Math.round(foodDeposit)}`);
                desc.innerText = ruleTexts.length > 0 ? ruleTexts.join(" + ") : "免收訂金 (系統將查核 No-Show)"; btn.innerText = finalDeposit > 0 ? "確認並前往付款" : "送出訂位與點餐"; btn.className = "w-full bg-gold-500 text-black font-bold text-lg rounded-xl py-3.5";
            }
        }
        summaryDeposit.innerText = `$${Math.round(finalDeposit).toLocaleString()}`;
    }

    function validateForm() {
        const name = document.getElementById('custName').value.trim(); const tel = document.getElementById('custTel').value.trim(); const time = document.getElementById('timeSelect') ? document.getElementById('timeSelect').value : '';
        if(!name || !tel || !time) { alert("⚠️ 請完整填寫姓名與電話，並確保已選擇時段。"); return false; }
        if((tel.match(/\d/g) || []).length < 6) { alert("⚠️ 電話號碼格式錯誤。"); return false; }
        return true;
    }

    async function handleMainAction() {
        const btn = document.getElementById('mainActionBtn');
        if (btn.innerText === "請選擇餐點") return;

        if (state.view === 2) {
            if (!validateForm()) return; 
            if (state.service === 'takeout' || (state.service === 'dine-in' && state.wantsPreorder)) {
                renderMenu(); state.view = 3;
                document.getElementById('menuNotice').innerText = state.service === 'takeout' ? "💡 外帶需全額線上結帳。 (已隱藏不開放外帶之品項)" : "💡 高價食材需全額預付，一般餐點收 30% 訂金。 (已根據時段自動過濾)";
                updateView(); return;
            }
        }

        const originalText = btn.innerText;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-black"></i>`;
        lucide.createIcons(); btn.disabled = true;

        // 🌟 在送出前，將陣列轉換成後端大腦需要的「扁平字典 (flatCart)」與「廚房完美明細」
        let flatCart = {};
        let totalFoodAmount = 0; 
        let foodDeposit = 0;
        let kitchenDetails = "\n【📝 廚房客製化明細】\n";

        state.cart.forEach((c, index) => {
            // 給庫存 API 扣除的字典 (ID -> 數量)
            flatCart[c.mainId] = (flatCart[c.mainId] || 0) + 1;
            if (c.freeId) flatCart[c.freeId] = (flatCart[c.freeId] || 0) + 1;
            if (c.paidId) flatCart[c.paidId] = (flatCart[c.paidId] || 0) + 1;

            // 計算金額
            let cost = c.price + c.paidPrice;
            totalFoodAmount += cost;
            const item = state.menuData.find(i => i.id === c.mainId);
            foodDeposit += state.service === 'takeout' ? cost : ((item && item.require_prepay) ? cost : cost * 0.3);

            // 🌟 聰明的廚房明細組合
            let descParts = [];
            if (c.freeId) descParts.push(`調味: ${c.freeName}`);
            if (c.paidId) descParts.push(`升級: ${c.paidName}`);
            let desc = descParts.length > 0 ? `(${descParts.join(', ')})` : '';
            
            kitchenDetails += `🔸 ${index + 1}. ${c.mainName} ${desc}\n`;
        });

        let paxDeposit = state.pax >= 5 ? state.pax * 500 : 0;
        let finalDeposit = state.service === 'takeout' ? totalFoodAmount : (paxDeposit + foodDeposit);

        const payload = {
            service_type: state.service, name: document.getElementById('custName').value, tel: document.getElementById('custTel').value,
            date: document.getElementById('dateSelect').value, time: document.getElementById('timeSelect').value,
            line_id: state.lineId, pax: state.pax, 
            cart: flatCart, // 送出給後端算庫存的扁平格式
            total_amount: totalFoodAmount, deposit_required: Math.round(finalDeposit),
            kitchen_remarks: state.cart.length > 0 ? kitchenDetails : "" // 🌟 傳送完美明細字串！
        };

        try {
            const response = await fetch(`${API_BASE_URL}/api/submit_booking`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.status === "require_payment") {
                let msg = `💳 系統提示\n`;
                if (result.is_noshow_penalty) msg += `⚠️ 由於您過去有未出席(No-Show)紀錄，本次訂單需收取訂金 $${result.deposit_amount}。\n\n`;
                else if (result.deposit_amount > 0) msg += `本次訂單需線上支付 $${result.deposit_amount}。\n\n`;
                msg += `點擊確定後，將導向 LINE Pay 進行結帳。`;
                alert(msg);
                window.location.href = result.payment_url;
            } else if (result.status === "success") {
                alert(`✅ 訂位成功！\n期待您的光臨。`);
                window.location.href = "./index.html"; 
            } else { throw new Error(result.detail || "發生未知錯誤"); }
        } catch (error) {
            alert(`❌ 送出失敗: ${error.message}\n請確認 FastAPI 伺服器是否正常運作，且 API_BASE_URL 網址正確。`);
            btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
        }
    }
</script>
